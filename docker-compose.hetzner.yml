version: '3.8'

services:
  kotoba-api:
    build:
      context: .
      dockerfile: Dockerfile.hetzner
    ports:
      - "8090:8090"
    volumes:
      # Bind mount to Hetzner persistent volume
      # Host path: /mnt/apps-data (symlink to /mnt/HC_Volume_105332474)
      # Container path: /mnt/apps-data (matches SQLITE_PATH in .env.hetzner)
      - /mnt/apps-data:/mnt/apps-data
    environment:
      - ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
