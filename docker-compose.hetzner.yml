version: '3.8'

services:
  kotoba-api:
    build:
      context: .
      dockerfile: Dockerfile.hetzner
    ports:
      - "8080:8080"
    volumes:
      # Persistent volume for SQLite database
      # On Hetzner, mount your persistent volume to /data
      - kotoba-data:/data
    environment:
      - ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  kotoba-data:
    # On Hetzner, this maps to your persistent volume
    driver: local
