version: '3.8'

services:
  kotoba-api:
    build: .
    ports:
      - "8090:8090"
    environment:
      - PORT=8090
      - DB_DRIVER=sqlite
      - SQLITE_PATH=/data/kotoba.db
      - JWT_SECRET=${JWT_SECRET:-your-jwt-secret-change-in-production}
    volumes:
      - ./data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8090/api/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s